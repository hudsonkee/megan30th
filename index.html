<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parallax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 200vh;
      overflow-x: hidden;
      background: black;
    }

    .layer {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-repeat: repeat;
      background-size: 1920px 1080px;
      will-change: transform;
    }
  </style>
</head>
<body>

  <!-- Layers (EDIT ONLY FILE NAMES IF NEEDED) -->
  <div class="layer" data-img="1.png"></div>
  <div class="layer" data-img="2.png"></div>
  <div class="layer" data-img="3.png"></div>
  <div class="layer" data-img="4.png"></div>
  <div class="layer" data-img="5.png"></div>
  <div class="layer" data-img="6.png"></div>
  <div class="layer" data-img="7.png"></div>
  <div class="layer" data-img="8.png"></div>
  <div class="layer" data-img="9.png"></div>
  <div class="layer" data-img="10.jpg"></div>

  <script>
    const layers = document.querySelectorAll('.layer');

    // 🔥 IMPORTANT: this is the ONLY place that sets the path
    const IMAGE_PATH = 'images/';

    // Load images safely with fallback color if missing
    layers.forEach((layer, i) => {
      const file = layer.dataset.img;
      const url = IMAGE_PATH + file;

      const img = new Image();
      img.src = url;

      img.onload = () => {
        layer.style.backgroundImage = `url('${url}')`;
      };

      img.onerror = () => {
        console.error("Missing:", url);
        // fallback so you SEE the layer even if image fails
        layer.style.background = `hsl(${i * 36}, 70%, 50%)`;
      };
    });

    let mouseX = 0;
    let mouseY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    function animate() {
      const scrollY = window.scrollY;

      layers.forEach((layer, i) => {
        const depth = (i + 1) * 50;

        const x = mouseX * depth;
        const y = mouseY * depth + scrollY * (i * 8);
        const scale = 1 + i * 0.05;

        layer.style.transform = `
          translate(${x}px, ${y}px)
          scale(${scale})
        `;
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
