<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megan 30th Infinite Parallax Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    background: black;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="parallaxCanvas"></canvas>

<script>
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Mouse position normalized
let mouseX = 0;
let mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / width - 0.5);
  mouseY = (e.clientY / height - 0.5);
});

// Load images
const layerFiles = [
  'images/10.jpg',
  'images/9.png',
  'images/8.png',
  'images/7.png',
  'images/6.png',
  'images/5.png',
  'images/4.png',
  'images/3.png',
  'images/2.png',
  'images/1.png'
];

const layers = [];
let loadedCount = 0;

layerFiles.forEach((src, i) => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layerFiles.length) {
      requestAnimationFrame(draw);
    }
  };
  layers.push({img, offsetX: 0, offsetY: 0});
});

// Animation loop
function draw() {
  ctx.clearRect(0, 0, width, height);

  layers.forEach((layer, i) => {
    const img = layer.img;
    if (!img.width) return;

    // Dramatic parallax: front layers move more
    const depth = (i + 1) * 200; // adjust for more drama
    layer.offsetX += mouseX * depth;
    layer.offsetY += mouseY * depth;

    // Tile calculation
    const tileW = img.width;
    const tileH = img.height;

    // Wrap offsets to repeat infinitely
    const offsetX = layer.offsetX % tileW;
    const offsetY = layer.offsetY % tileH;

    // Draw tiles in a grid to fill canvas
    const cols = Math.ceil(width / tileW) + 2;
    const rows = Math.ceil(height / tileH) + 2;

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        ctx.drawImage(
          img,
          col * tileW + offsetX,
          row * tileH + offsetY,
          tileW,
          tileH
        );
      }
    }
  });

  requestAnimationFrame(draw);
}

// Resize handling
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});
</script>

</body>

<script>

// Z-index: 10 back, 1 front

});

let mouseX = 0, mouseY = 0;
let targetX = 0, targetY = 0;
const ease = 0.1;

// Initial offset so layers start centered
const centerX = -2 * window.innerWidth;
const centerY = -2 * window.innerHeight;

document.addEventListener('mousemove', e => {
  targetX = (e.clientX / window.innerWidth - 0.5);
  targetY = (e.clientY / window.innerHeight - 0.5);
});

function animate() {
  mouseX += (targetX - mouseX) * ease;
  mouseY += (targetY - mouseY) * ease;

  layers.forEach((layer, i) => {
    const depth = (i + 1) * 250; // dramatic multiplier
    const x = centerX + mouseX * depth;
    const y = centerY + mouseY * depth;

    layer.style.transform = `translate(${x}px, ${y}px)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

      // Smooth interpolation for easing
      mouseX += (targetX - mouseX) * ease;
      mouseY += (targetY - mouseY) * ease;

      layers.forEach((layer, i) => {
        // Dramatic movement multiplier, but small enough to stay on screen
        const depth = (i + 1) * 200; 
        const x = mouseX * depth;
        const y = mouseY * depth;
