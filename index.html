<!DOCTYPE html>
// Favicon
<link rel="icon" type="image/png" href="30simple.png">
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Megan!</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100vh;
  background: black;
}
canvas {
  display: block;
  width: 100vw;   /* Stretch canvas to full viewport */
  height: 100vh;
}

/* Webamp container floats above canvas */
#webamp-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9999;
}
</style>
</head>
<body>
<img src="megan30header2.png" style="
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
">
<canvas id="parallaxCanvas"></canvas>
<div id="webamp-container"></div>

<!-- Webamp Module -->
<script type="module">
import Webamp from "https://unpkg.com/webamp@^2";

// Initialize Webamp
const webamp = new Webamp({
  initialTracks: [
    {
      metaData: {
        artist: "Hudson Lee",
        title: "Civic Racer",
      },
      url: "./song.mp3",     // Place your MP3 in the root folder
      duration: 5.322244897959183
    },
    {
      metaData: {
        artist: "Hudson Lee",
        title: "Fairy Lights",
      },
      url: "./song2.mp3",     // Place your MP3 in the root folder
      duration: 5.322244897959183
    },
  ],
  initialSkin: {
    url: "./cuteamp.wsz"     // Your skin file in the root folder
  }
});
webamp.renderWhenReady(document.getElementById("webamp-container"));
</script>

// Parallax
<script>
// CONFIG
const layersCount = 10;
const mouseIntensity = 0.8;
const layerScaleFront = 0.05;
const tileWidth = 1440;
const tileHeight = 810;
const tileBuffer = 1;

// Scale factor for rendering (smaller canvas for better performance)
const renderScale = 0.7;

// Canvas setup
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');
let width = window.innerWidth * renderScale;
let height = window.innerHeight * renderScale;
canvas.width = width;
canvas.height = height;

// Mouse tracking
let targetX = width/2, targetY = height/2;
let mouseX = width/2, mouseY = height/2;
document.addEventListener('mousemove', e => {
  targetX = e.clientX * renderScale;
  targetY = e.clientY * renderScale;
});

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];

const layers = [];
let loadedCount = 0;
layerFiles.forEach(src => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layersCount) requestAnimationFrame(draw);
  };
  layers.push({ img });
});

// Draw loop
function draw() {
  ctx.clearRect(0, 0, width, height);

  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;

  layers.forEach((layer, i) => {
    const img = layer.img;
    if (!img.width) return;

    const depth = ((i+1)/layersCount) * 4;
    let offsetX = (mouseX - width/2) * mouseIntensity * depth;
    let offsetY = (mouseY - height/2) * mouseIntensity * depth;
    offsetX = offsetX % tileWidth;
    offsetY = offsetY % tileHeight;

    const scale = 1 + (i / layersCount) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    // Calculate tiles to cover downscaled canvas
    const cols = Math.ceil(width / (tileWidth * scale)) + tileBuffer;
    const rows = Math.ceil(height / (tileHeight * scale)) + tileBuffer;

    for (let row = -tileBuffer; row < rows; row++) {
      for (let col = -tileBuffer; col < cols; col++) {
        ctx.drawImage(img, col * tileWidth - offsetX, row * tileHeight - offsetY, tileWidth, tileHeight);
      }
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// Resize handler
window.addEventListener('resize', () => {
  width = window.innerWidth * renderScale;
  height = window.innerHeight * renderScale;
  canvas.width = width;
  canvas.height = height;
});
</script>

</body>
</html>
