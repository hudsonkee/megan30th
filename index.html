<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megan 30th Infinite Parallax</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100vh;
  background: black;
}
canvas { display: block; }
</style>
</head>
<body>

<canvas id="parallaxCanvas"></canvas>

<script>
// ===================== CONFIG =====================
const mouseIntensity = 3;  // ↑ change this for more/less dramatic movement
const layerScaleFront = 0.3; // 0 = no scaling, 0.3 = front layer slightly bigger
const tileSize = 300; // each tile size in pixels

// ===================== SETUP =====================
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Mouse tracking
let targetX = 0, targetY = 0;
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  targetX = e.clientX;
  targetY = e.clientY;
});

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];

const layers = [];
let loadedCount = 0;

layerFiles.forEach((src, i) => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layerFiles.length) requestAnimationFrame(draw);
  };
  layers.push({img});
});

// ===================== DRAW LOOP =====================
function draw() {
  ctx.clearRect(0, 0, width, height);

  // Smooth mouse movement
  mouseX += (targetX - mouseX) * 0.1;
  mouseY += (targetY - mouseY) * 0.1;

  layers.forEach((layer, i) => {
    const img = layer.img;
    if (!img.width) return;

    // Tile width/height
    const tileW = tileSize;
    const tileH = tileSize;

    // Dramatic parallax: multiply mouse offset
    const depth = (i + 1) * mouseIntensity;

    // Calculate offsets from center
    const offsetX = (mouseX - width/2) * depth % tileW;
    const offsetY = (mouseY - height/2) * depth % tileH;

    // Optional scaling for front layers
    const scale = 1 + (i / layers.length) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    // Calculate number of tiles to cover screen (plus buffer)
    const cols = Math.ceil(width / tileW / scale) + 2;
    const rows = Math.ceil(height / tileH / scale) + 2;

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        ctx.drawImage(
          img,
          col * tileW - offsetX,
          row * tileH - offsetY,
          tileW,
          tileH
        );
      }
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// ===================== RESIZE HANDLER =====================
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});
</script>

</body>
</html>
