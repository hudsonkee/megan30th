<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megan 30th Infinite Parallax + Webamp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100vh;
  background: black;
}
canvas {
  display: block;
}

/* Webamp container floats above canvas */
#webamp-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9999;
}
</style>
</head>
<body>

<canvas id="parallaxCanvas"></canvas>
<div id="webamp-container"></div>

<!-- Webamp Module -->
<script type="module">
import Webamp from "https://unpkg.com/webamp@^2";

// Initialize Webamp with multiple tracks
const webamp = new Webamp({
  initialTracks: [
    {
      metaData: { artist: "Hudson Lee", title: "Civic Racer" },
      url: "./song.mp3",
      duration: 5.322244897959183
    },
    {
      metaData: { artist: "Hudson Lee", title: "Fairy Lights" },
      url: "./song2.mp3",
      duration: 5.322244897959183
    },
  ],
  initialSkin: { url: "./cuteamp.wsz" }
});
webamp.renderWhenReady(document.getElementById("webamp-container"));
</script>

<!-- Optimized Parallax Script -->
<script>
// CONFIG
const layersCount = 10;
const mouseIntensity = 0.8;
const layerScaleFront = 0.05;
const tileWidth = 1920;
const tileHeight = 1080;

// Canvas setup
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');
let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Mouse tracking
let targetX = width/2, targetY = height/2;
let mouseX = width/2, mouseY = height/2;
document.addEventListener('mousemove', e => {
  targetX = e.clientX;
  targetY = e.clientY;
});

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];

const layers = [];
let loadedCount = 0;
layerFiles.forEach(src => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layersCount) initLayers();
  };
  layers.push({ img });
});

// Initialize offscreen canvases for performance
function initLayers() {
  layers.forEach(layer => {
    // Dynamic offscreen canvas: size = enough to cover viewport + buffer
    const offCanvas = document.createElement('canvas');
    const offCtx = offCanvas.getContext('2d');

    const tilesX = Math.ceil(width / tileWidth) + 2;
    const tilesY = Math.ceil(height / tileHeight) + 2;
    offCanvas.width = tilesX * tileWidth;
    offCanvas.height = tilesY * tileHeight;

    // Pre-render tiled layer
    for (let row = 0; row < tilesY; row++) {
      for (let col = 0; col < tilesX; col++) {
        offCtx.drawImage(layer.img, col * tileWidth, row * tileHeight, tileWidth, tileHeight);
      }
    }

    layer.offCanvas = offCanvas;
    layer.offsetX = 0;
    layer.offsetY = 0;
    layer.tilesX = tilesX;
    layer.tilesY = tilesY;
  });

  requestAnimationFrame(draw);
}

// Draw loop
function draw() {
  ctx.clearRect(0, 0, width, height);

  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;

  layers.forEach((layer, i) => {
    const depth = ((i+1)/layersCount) * 4;
    layer.offsetX += (mouseX - width/2) * mouseIntensity * depth;
    layer.offsetY += (mouseY - height/2) * mouseIntensity * depth;

    // Wrap offsets for infinite tiling
    const offX = layer.offsetX % tileWidth;
    const offY = layer.offsetY % tileHeight;

    const scale = 1 + (i / layersCount) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    // Draw pre-rendered offscreen canvas at offset
    ctx.drawImage(layer.offCanvas, -tileWidth + offX, -tileHeight + offY);

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// Resize handling
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;

  // Recreate offscreen canvases on resize for performance
  layers.forEach(layer => {
    const offCanvas = document.createElement('canvas');
    const offCtx = offCanvas.getContext('2d');

    const tilesX = Math.ceil(width / tileWidth) + 2;
    const tilesY = Math.ceil(height / tileHeight) + 2;
    offCanvas.width = tilesX * tileWidth;
    offCanvas.height = tilesY * tileHeight;

    for (let row = 0; row < tilesY; row++) {
      for (let col = 0; col < tilesX; col++) {
        offCtx.drawImage(layer.img, col * tileWidth, row * tileHeight, tileWidth, tileHeight);
      }
    }

    layer.offCanvas = offCanvas;
    layer.tilesX = tilesX;
    layer.tilesY = tilesY;
  });
});
</script>

</body>
</html>
