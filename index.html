<!-- Draggable Script -->
<script>
    const elements = document.querySelectorAll(".draggable");
    let z = 1000;
    let current = null;
    let offsetX = 0, offsetY = 0;

    elements.forEach(el => {
      // Random initial positions (stay inside viewport)
      const style = window.getComputedStyle(el);
      let width = parseFloat(style.width) / window.innerWidth * 100; // % of viewport
      const topPercent = Math.random() * 80;   
      const leftPercent = Math.random() * (100 - width); // prevent spawning offscreen
      el.style.top = topPercent + "vh";
      el.style.left = leftPercent + "vw";
      el.style.cursor = "grab";

      // Windows-style drag
      el.addEventListener("mousedown", startDrag);
      el.addEventListener("touchstart", startDrag);

      function startDrag(e) {
        current = el;
        const rect = el.getBoundingClientRect();
        const { x, y } = getClientXY(e);
        offsetX = x - rect.left;
        offsetY = y - rect.top;
        el.style.cursor = "grabbing";
        el.style.zIndex = ++z;
        e.preventDefault();
      }

      function getClientXY(e) {
        if (e.touches && e.touches.length > 0) {
          return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else {
          return { x: e.clientX, y: e.clientY };
        }
      }
    });

    // Move draggable and clamp to viewport
    function moveDrag(e) {
      if (!current) return;
      const { x, y } = currentTouches(e);

      let newLeft = x - offsetX;
      let newTop = y - offsetY;

      const imgWidth = current.offsetWidth;
      const imgHeight = current.offsetHeight;

      const maxLeft = window.innerWidth - imgWidth;
      const maxTop = window.innerHeight - imgHeight;

      current.style.left = Math.min(Math.max(0, newLeft), maxLeft) + "px";
      current.style.top = Math.min(Math.max(0, newTop), maxTop) + "px";
    }

    document.addEventListener("mousemove", moveDrag);
    document.addEventListener("touchmove", moveDrag, { passive: false });

    function currentTouches(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      } else {
        return { x: e.clientX, y: e.clientY };
      }
    }

    function endDrag() {
      if (current) current.style.cursor = "grab";
      current = null;
    }

    document.addEventListener("mouseup", endDrag);
    document.addEventListener("touchend", endDrag);
    document.addEventListener("touchcancel", endDrag);
</script>

<script type="module">
import Webamp from "https://unpkg.com/webamp@^2";

<!-- Parallax -->
<script>
// CONFIG
const layersCount = 10;
const mouseIntensity = 0.8;
const layerScaleFront = 0.05;
const tileWidth = 1440;
const tileHeight = 810;
const tileBuffer = 1;

// Scale factor for rendering (smaller canvas for better performance)
const renderScale = 0.7;

// Canvas setup
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');
let width = window.innerWidth * renderScale;
let height = window.innerHeight * renderScale;
canvas.width = width;
canvas.height = height;

// Mouse + Touch tracking
let targetX = width/2, targetY = height/2;
let mouseX = width/2, mouseY = height/2;

function updateTarget(e) {
  let x, y;
  if (e.touches && e.touches.length > 0) {
    x = e.touches[0].clientX;
    y = e.touches[0].clientY;
  } else {
    x = e.clientX;
    y = e.clientY;
  }
  targetX = x * renderScale;
  targetY = y * renderScale;
}

document.addEventListener('mousemove', updateTarget);
document.addEventListener('touchmove', function(e){
  updateTarget(e);
  e.preventDefault(); // prevent scrolling while dragging/touching
}, { passive: false });

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];

const layers = [];
let loadedCount = 0;
layerFiles.forEach(src => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layersCount) requestAnimationFrame(draw);
  };
  layers.push({ img });
});

// Draw loop
function draw() {
  ctx.clearRect(0, 0, width, height);

  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;

  layers.forEach((layer, i) => {
    const img = layer.img;
    if (!img.width) return;

    const depth = ((i+1)/layersCount) * 4;
    let offsetX = (mouseX - width/2) * mouseIntensity * depth;
    let offsetY = (mouseY - height/2) * mouseIntensity * depth;
    offsetX = offsetX % tileWidth;
    offsetY = offsetY % tileHeight;

    const scale = 1 + (i / layersCount) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    // Calculate tiles to cover downscaled canvas
    const cols = Math.ceil(width / (tileWidth * scale)) + tileBuffer;
    const rows = Math.ceil(height / (tileHeight * scale)) + tileBuffer;

    for (let row = -tileBuffer; row < rows; row++) {
      for (let col = -tileBuffer; col < cols; col++) {
        ctx.drawImage(img, col * tileWidth - offsetX, row * tileHeight - offsetY, tileWidth, tileHeight);
      }
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// Resize handler
window.addEventListener('resize', () => {
  width = window.innerWidth * renderScale;
  height = window.innerHeight * renderScale;
  canvas.width = width;
  canvas.height = height;
});
</script>
