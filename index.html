<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megan 30th Infinite Parallax</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    background: black;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="parallaxCanvas"></canvas>

<script>
// ===================== CONFIG =====================
const layersCount = 10;
const mouseIntensity = 2;  // smaller = smoother/slower, larger = more dramatic
const layerScaleFront = 0.1; // subtle scale for front layers
const tileBuffer = 1; // extra tiles to draw offscreen

// ===================== SETUP =====================
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Track mouse in pixels
let targetX = 0, targetY = 0;
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  targetX = e.clientX;
  targetY = e.clientY;
});

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];

const layers = [];
let loadedCount = 0;

layerFiles.forEach((src, i) => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if (loadedCount === layersCount) requestAnimationFrame(draw);
  };
  layers.push({img, offsetX: 0, offsetY: 0});
});

// ===================== DRAW LOOP =====================
function draw() {
  ctx.clearRect(0, 0, width, height);

  // Smooth mouse movement
  mouseX += (targetX - mouseX) * 0.05;
  mouseY += (targetY - mouseY) * 0.05;

  layers.forEach((layer, i) => {
    const img = layer.img;
    if (!img.width) return;

    // Calculate layer depth for parallax
    const depth = ((i + 1) / layersCount) * mouseIntensity * 300; // multiplier for movement

    // Incremental offset for “floating” effect
    layer.offsetX += (mouseX - width/2) * 0.01 * (i+1); 
    layer.offsetY += (mouseY - height/2) * 0.01 * (i+1); 

    const tileW = width;  // full-screen start
    const tileH = height;

    // Wrap offsets to repeat infinitely
    const offsetX = layer.offsetX % tileW;
    const offsetY = layer.offsetY % tileH;

    const scale = 1 + (i / layersCount) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    const cols = Math.ceil(width / tileW) + tileBuffer;
    const rows = Math.ceil(height / tileH) + tileBuffer;

    for (let row = -tileBuffer; row < rows; row++) {
      for (let col = -tileBuffer; col < cols; col++) {
        ctx.drawImage(
          img,
          col * tileW - offsetX,
          row * tileH - offsetY,
          tileW,
          tileH
        );
      }
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// ===================== RESIZE HANDLER =====================
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});
</script>

</body>
</html>
