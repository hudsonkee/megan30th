<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Megan 30th Parallax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 200vh; /* allow scrolling */
      overflow-x: hidden;
      background: black;
    }

    .layer {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-repeat: repeat;
      background-size: 1920px 1080px;
      will-change: transform;
    }
  </style>
</head>
<body>

  <!-- Parallax layers: layer 10 first (back), layer 1 last (front) -->
  <div class="layer" data-img="10.jpg"></div>
  <div class="layer" data-img="9.png"></div>
  <div class="layer" data-img="8.png"></div>
  <div class="layer" data-img="7.png"></div>
  <div class="layer" data-img="6.png"></div>
  <div class="layer" data-img="5.png"></div>
  <div class="layer" data-img="4.png"></div>
  <div class="layer" data-img="3.png"></div>
  <div class="layer" data-img="2.png"></div>
  <div class="layer" data-img="1.png"></div>

  <script>
    const layers = document.querySelectorAll('.layer');
    const IMAGE_PATH = 'images/'; // relative to index.html

    // Load images
    layers.forEach(layer => {
      const file = layer.dataset.img;
      const url = IMAGE_PATH + file;

      const img = new Image();
      img.src = url;

      img.onload = () => {
        layer.style.backgroundImage = `url('${url}')`;
      };

      img.onerror = () => {
        console.error("Missing image:", url);
        // No fallback color — layer just won't appear if missing
      };
    });

    // Mouse position
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    // Animate parallax
    function animate() {
      const scrollY = window.scrollY;

      layers.forEach((layer, i) => {
        const depth = (i + 1) * 50; // stronger separation
        const x = mouseX * depth;
        const y = mouseY * depth + scrollY * (i * 8);
        const scale = 1;

        layer.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;

        // Reverse z-index: last layer in DOM (layer 1) is on top
        layer.style.zIndex = layers.length - i;
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
