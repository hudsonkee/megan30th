<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megan 30th Infinite Parallax</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; overflow:hidden; height:100vh; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="parallaxCanvas"></canvas>

<script>
// CONFIG
const layersCount = 10;
const mouseIntensity = 20; // higher for more scroll movement
const layerScaleFront = 10;
const tileWidth = 1920;
const tileHeight = 1080;
const tileBuffer = 1;

// SETUP
const canvas = document.getElementById('parallaxCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Mouse tracking with easing
let targetX = width/2, targetY = height/2;
let mouseX = width/2, mouseY = height/2;
document.addEventListener('mousemove', e => {
  targetX = e.clientX;
  targetY = e.clientY;
});

// Load images
const layerFiles = [
  'images/10.jpg','images/9.png','images/8.png','images/7.png','images/6.png',
  'images/5.png','images/4.png','images/3.png','images/2.png','images/1.png'
];
const layers = [];
let loadedCount = 0;

layerFiles.forEach((src, i) => {
  const img = new Image();
  img.src = src;
  img.onload = () => {
    loadedCount++;
    if(loadedCount === layersCount) requestAnimationFrame(draw);
  };
  layers.push({img});
});

// DRAW LOOP
function draw() {
  ctx.clearRect(0, 0, width, height);

  // Smooth mouse easing
  mouseX += (targetX - mouseX) * 0.08;
  mouseY += (targetY - mouseY) * 0.08;

  layers.forEach((layer, i) => {
    const img = layer.img;
    if(!img.width) return;

    // Depth for parallax (front layers move more)
    const depth = ((i+1)/layersCount) * 3; // increased multiplier for stronger scroll

    // Compute offsets
    let offsetX = (mouseX - width/2) * mouseIntensity * depth;
    let offsetY = (mouseY - height/2) * mouseIntensity * depth;

    // Wrap offsets for infinite tiling
    offsetX = offsetX % tileWidth;
    offsetY = offsetY % tileHeight;

    const scale = 1 + (i / layersCount) * layerScaleFront;
    ctx.save();
    ctx.scale(scale, scale);

    const cols = Math.ceil(width / tileWidth / scale) + tileBuffer;
    const rows = Math.ceil(height / tileHeight / scale) + tileBuffer;

    for(let row=-tileBuffer; row<rows; row++){
      for(let col=-tileBuffer; col<cols; col++){
        ctx.drawImage(
          img,
          col*tileWidth - offsetX,
          row*tileHeight - offsetY,
          tileWidth,
          tileHeight
        );
      }
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}

// RESIZE HANDLER
window.addEventListener('resize', ()=>{
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});
</script>

</body>
</html>
