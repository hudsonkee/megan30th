<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Megan 30th Parallax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    .layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      will-change: transform;
    }

    .layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Layer 10 back, Layer 1 front -->
  <div class="layer"><img src="images/10.jpg" alt="Layer 10"></div>
  <div class="layer"><img src="images/9.png" alt="Layer 9"></div>
  <div class="layer"><img src="images/8.png" alt="Layer 8"></div>
  <div class="layer"><img src="images/7.png" alt="Layer 7"></div>
  <div class="layer"><img src="images/6.png" alt="Layer 6"></div>
  <div class="layer"><img src="images/5.png" alt="Layer 5"></div>
  <div class="layer"><img src="images/4.png" alt="Layer 4"></div>
  <div class="layer"><img src="images/3.png" alt="Layer 3"></div>
  <div class="layer"><img src="images/2.png" alt="Layer 2"></div>
  <div class="layer"><img src="images/1.png" alt="Layer 1"></div>

  <script>
    const layers = document.querySelectorAll('.layer');

    // Set z-index so layer 10 = back, layer 1 = front
    layers.forEach((layer, i) => {
      layer.style.zIndex = i;
    });

    // Track mouse position
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;
    const ease = 0.1; // smoothing factor

    document.addEventListener('mousemove', e => {
      targetX = (e.clientX / window.innerWidth - 0.5);
      targetY = (e.clientY / window.innerHeight - 0.5);
    });

    function animate() {
      // Smooth interpolation for easing
      mouseX += (targetX - mouseX) * ease;
      mouseY += (targetY - mouseY) * ease;

      layers.forEach((layer, i) => {
        // Dramatic movement multiplier, but small enough to stay on screen
        const depth = (i + 1) * 200; 
        const x = mouseX * depth;
        const y = mouseY * depth;

        layer.style.transform = `translate(${x}px, ${y}px)`;
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
