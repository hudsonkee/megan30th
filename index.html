<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Webamp Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100vh;
    overflow: hidden;
  }

  #webamp-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div id="webamp-container"></div>

<!-- Include Webamp library -->
<script src="https://unpkg.com/webamp"></script>

<script>
window.addEventListener("load", () => {
  const webamp = new Webamp({
    initialTracks: [
      { 
        metaData: { artist: "Test Artist", title: "Test Track" },
        url: "song.mp3"  // Place song.mp3 in the root folder
      }
    ],
    initialSkin: {
      url: "https://unpkg.com/webamp@latest/skins/base-2.91.wsz"
    }
  });

  webamp.renderWhenReady(document.getElementById("webamp-container"));
});
</script>

</body>
</html>
