<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Megan 30th Parallax</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 200vh; /* allow scrolling */
      overflow-x: hidden;
      background: black;
    }

    .layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none; /* mouse passes through */
      will-change: transform;
    }

    .layer img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills the viewport while preserving aspect */
      display: block;
    }
  </style>
</head>
<body>

  <!-- Layer 10 first (back), Layer 1 last (front) -->
  <div class="layer"><img src="images/10.jpg" alt="Layer 10"></div>
  <div class="layer"><img src="images/9.png" alt="Layer 9"></div>
  <div class="layer"><img src="images/8.png" alt="Layer 8"></div>
  <div class="layer"><img src="images/7.png" alt="Layer 7"></div>
  <div class="layer"><img src="images/6.png" alt="Layer 6"></div>
  <div class="layer"><img src="images/5.png" alt="Layer 5"></div>
  <div class="layer"><img src="images/4.png" alt="Layer 4"></div>
  <div class="layer"><img src="images/3.png" alt="Layer 3"></div>
  <div class="layer"><img src="images/2.png" alt="Layer 2"></div>
  <div class="layer"><img src="images/1.png" alt="Layer 1"></div>

  <script>
    const layers = document.querySelectorAll('.layer');

    // Mouse position
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });

    // Animate parallax
    function animate() {
      const scrollY = window.scrollY;

      layers.forEach((layer, i) => {
        const depth = (i + 1) * 30; // back layers move less
        const x = mouseX * depth;
        const y = mouseY * depth + scrollY * (i * 5);

        layer.style.transform = `translate(${x}px, ${y}px)`;

        // Layer 10 back (zIndex=0), Layer 1 front (zIndex=9)
        layer.style.zIndex = i;
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
