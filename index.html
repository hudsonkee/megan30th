<!DOCTYPE html>
<html>
<head>
    <title>My Webamp Page</title>
</head>
<body>
    <div id="app" style="height: 100vh">
        <!-- Webamp will attempt to center itself within this div -->
    </div>

    <script type="module">
    import Webamp from "https://unpkg.com/webamp@^2";
    const webamp = new Webamp({
        initialTracks: [
            {
                metaData: {
                    artist: "Hudson Lee",
                    title: "Civic Racer",
                },
                url: "./song.mp3", // Path to your MP3 file
                duration: 5.322244897959183
            }
        ],
        initialSkin: {
            url: "./assets/base-2.91.wsz" // Path to your skin file
        }
    });
    webamp.renderWhenReady(document.getElementById("app"));
</script>
</body>
</html>
